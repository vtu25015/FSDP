<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Add Event</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>
    <div class="container">
        <h2>Add New Event</h2>
        <form th:action="@{/events/save}" th:object="${event}" method="post">
            <label>Title:</label>
            <input type="text" th:field="*{title}" required><br><br>

            <label>Description:</label>
            <input type="text" th:field="*{description}" required><br><br>

            <label>Date:</label>
            <input type="date" th:field="*{date}" required><br><br>

            <label>Venue:</label>
            <input type="text" th:field="*{venue}" required><br><br>

            <label>Capacity:</label>
            <input type="number" th:field="*{capacity}" required><br><br>

            <button type="submit">Save Event</button>
        </form>
    </div>
</body>
</html>
