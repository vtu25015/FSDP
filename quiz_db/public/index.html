<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Automated Quiz Engine</title>
<!-- jsPDF library for PDF certificate -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
/* Reset */
* { box-sizing: border-box; margin:0; padding:0; }

/* Body */
body {
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    background: linear-gradient(135deg, #0f172a, #1e293b);
    color: #fff;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    overflow: hidden;
}

/* Container */
.container {
    background: #1e293b;
    padding: 40px 30px;
    border-radius: 15px;
    width: 450px;
    max-width: 95%;
    text-align: center;
    box-shadow: 0 8px 30px rgba(0,0,0,0.5);
    position: relative;
    overflow: hidden;
}

/* Titles */
h1,h2 {
    margin-bottom: 20px;
    font-weight: 600;
    color: #38bdf8;
}

/* Input */
input[type="text"] {
    padding: 12px;
    margin: 10px 0;
    width: 95%;
    border-radius: 10px;
    border: none;
    outline: none;
    font-size: 16px;
}

/* Quiz Options */
.option {
    background: #334155;
    padding: 15px 12px;
    margin: 12px 0;
    border-radius: 12px;
    cursor: pointer;
    transition: 0.3s;
    display: flex;
    align-items: center;
    font-size: 16px;
}

.option:hover {
    background: #475569;
    transform: translateX(5px);
}

/* Radio buttons */
.option input {
    margin-right: 10px;
    accent-color: #38bdf8;
}

/* Buttons */
button {
    background: #38bdf8;
    border: none;
    padding: 14px 0;
    margin-top: 20px;
    border-radius: 12px;
    cursor: pointer;
    font-size: 16px;
    font-weight: 600;
    width: 100%;
    transition: 0.3s;
}

button:hover {
    background: #22d3ee;
    transform: translateY(-3px);
}

/* Screens */
#quizScreen, #resultScreen { display: none; }

/* Animations */
.fade-in {
    animation: fadeIn 0.6s ease-in-out;
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

/* Progress Bar */
.progress-container {
    width: 100%;
    height: 8px;
    background: #475569;
    border-radius: 8px;
    margin-bottom: 20px;
    overflow: hidden;
}
.progress-bar {
    height: 100%;
    width: 0%;
    background: #38bdf8;
    transition: width 0.4s ease;
}

/* Timer */
#timer {
    margin-top: 10px;
    font-size: 16px;
    font-weight: 500;
    color: #facc15;
}

/* Responsive */
@media screen and (max-width: 500px) {
    .container { padding: 30px 20px; }
    button, input[type="text"] { font-size: 14px; padding: 10px; }
}
</style>
</head>
<body>

<div class="container fade-in">

    <!-- START SCREEN -->
    <div id="startScreen" class="fade-in">
        <h1>Automated Quiz Engine</h1>
        <h2>with PDF Certification Generation</h2>
        <input type="text" id="name" placeholder="Enter your name">
        <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- QUIZ SCREEN -->
    <div id="quizScreen" class="fade-in">
        <div class="progress-container">
            <div class="progress-bar" id="progressBar"></div>
        </div>
        <h2 id="question"></h2>
        <div id="options"></div>
        <div id="timer">Time left: <span id="time">30</span> s</div>
        <button onclick="nextQuestion()">Next</button>
    </div>

    <!-- RESULT SCREEN -->
    <div id="resultScreen" class="fade-in">
        <h1>Result</h1>
        <h2 id="score"></h2>
        <button onclick="downloadCertificate()">Download Certificate</button>
    </div>

</div>

<script>
// ===== Quiz Variables =====
let questions = [];
let current = 0;
let answers = [];
let timer;
let timeLeft = 30;
let username = "";

// ===== Start Quiz =====
function startQuiz() {
    username = document.getElementById("name").value.trim();
    if (!username) return alert("Enter your name");
    localStorage.setItem("username", username);

    document.getElementById("startScreen").style.display = "none";
    document.getElementById("quizScreen").style.display = "block";

    fetch("/questions")
    .then(res => res.json())
    .then(data => {
        questions = data;
        loadQuestion();
        updateProgress();
    });
}

// ===== Load Question =====
function loadQuestion() {
    clearInterval(timer);
    timeLeft = 30;
    document.getElementById("time").innerText = timeLeft;

    const q = questions[current];
    document.getElementById("question").innerText = q.question;

    let optionsHTML = "";
    [q.option1, q.option2, q.option3, q.option4].forEach(opt => {
        optionsHTML += `
            <label class="option fade-in">
                <input type="radio" name="option" value="${opt}"> ${opt}
            </label>
        `;
    });
    document.getElementById("options").innerHTML = optionsHTML;

    startTimer();
}

// ===== Timer =====
function startTimer() {
    timer = setInterval(() => {
        timeLeft--;
        document.getElementById("time").innerText = timeLeft;
        if (timeLeft <= 0) {
            clearInterval(timer);
            alert("Time's up! Moving to next question.");
            answers.push(""); // unanswered
            current++;
            if (current < questions.length) loadQuestion();
            else submitQuiz();
        }
    }, 1000);
}

// ===== Next Question =====
function nextQuestion() {
    const selected = document.querySelector('input[name="option"]:checked');
    if (!selected) return alert("Select an option");

    clearInterval(timer);
    answers.push(selected.value);
    current++;
    updateProgress();

    if (current < questions.length) loadQuestion();
    else submitQuiz();
}

// ===== Progress Bar =====
function updateProgress() {
    const progress = (current / questions.length) * 100;
    document.getElementById("progressBar").style.width = progress + "%";
}

// ===== Submit Quiz =====
function submitQuiz() {
    fetch("/submit", {
        method: "POST",
        headers: {"Content-Type": "application/json"},
        body: JSON.stringify({ name: username, answers })
    })
    .then(res => res.json())
    .then(data => {
        document.getElementById("quizScreen").style.display = "none";
        document.getElementById("resultScreen").style.display = "block";
        document.getElementById("score").innerText = data.score + " / " + data.total;
        localStorage.setItem("score", data.score);
    });
}

// ===== Download PDF Certificate =====
function downloadCertificate() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({ orientation: "landscape", unit: "pt", format: "a4" });

    const name = localStorage.getItem("username") || "Student";
    const score = localStorage.getItem("score") || 0;

    // Background
    doc.setFillColor(30,41,59);
    doc.rect(0, 0, doc.internal.pageSize.width, doc.internal.pageSize.height, "F");

    // Border
    doc.setDrawColor(56,189,248);
    doc.setLineWidth(8);
    doc.rect(20, 20, doc.internal.pageSize.width-40, doc.internal.pageSize.height-40);

    // Title
    doc.setTextColor(56,189,248);
    doc.setFont("helvetica", "bold");
    doc.setFontSize(50);
    doc.text("Certificate of Completion", doc.internal.pageSize.width/2, 150, { align: "center" });

    // Subtitle
    doc.setTextColor(255,255,255);
    doc.setFontSize(24);
    doc.setFont("helvetica", "normal");
    doc.text("This certificate is proudly presented to", doc.internal.pageSize.width/2, 220, { align: "center" });

    // Name
    doc.setFont("helvetica", "bold");
    doc.setFontSize(40);
    doc.setTextColor(250,204,21);
    doc.text(name, doc.internal.pageSize.width/2, 280, { align: "center" });

    // Description
    doc.setFont("helvetica", "normal");
    doc.setFontSize(24);
    doc.setTextColor(255,255,255);
    doc.text("For successfully completing the Automated Quiz Engine", doc.internal.pageSize.width/2, 340, { align: "center" });

    // Score
    doc.setFont("helvetica", "bold");
    doc.setFontSize(28);
    doc.setTextColor(56,189,248);
    doc.text(`Score: ${score}`, doc.internal.pageSize.width/2, 400, { align: "center" });

    // Footer: Date and Signature
    const date = new Date().toLocaleDateString();
    doc.setFontSize(16);
    doc.setTextColor(148,163,184);
    doc.text(`Date: ${date}`, 50, doc.internal.pageSize.height - 50);
    doc.text("Signature", doc.internal.pageSize.width - 150, doc.internal.pageSize.height - 50);

    doc.save(`Certificate_${name.replace(/\s/g,'_')}.pdf`);
}
</script>

</body>
</html>
